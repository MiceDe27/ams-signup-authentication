<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Create an Account</h2>
        <form id="signup-form">
            <p>Register using your Google account</p>
            <button type="button" id="google-signup">Sign Up with Google</button>
        </form>
        <a href="https://localhost/">Already have an account? Log in</a>
    </div>

    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js"
        }
      }
    </script>
    
    <script type="module" src="signup.js"></script>
</body>
</html>
